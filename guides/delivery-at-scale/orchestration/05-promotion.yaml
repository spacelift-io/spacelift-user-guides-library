slug: delivery-promotion
ordering: 5
releaseState: testing
prerequisiteGuideSlugs:
  - "delivery-smart-orchestration"
metadata:
  title: "The Promotion Gate - Staging to Production"
  description: "Build a promotion pattern where staging deploys automatically but production requires manual approval"
  labels: ["promotion", "staging", "production", "approval", "gates"]
  difficulty: "medium"
  minutesToComplete: 20
  prerequisites:
    - "Completed the Smart Orchestration guide"

steps:
  - order: 1
    title: "Create a Shared Environment Folder"
    instruction: |
      1. In your repository, create a folder called **environments**.
      2. Add a **main.tf** file:
      ```language-hcl
      variable "env" {
        description = "Environment name"
      }

      resource "aws_s3_bucket" "env_bucket" {
        bucket_prefix = "orbit-labs-${var.env}-"

        tags = {
          name        = "Orbit Labs ${var.env}"
          managedBy   = "Spacelift"
          environment = var.env
        }
      }

      output "bucket_name" {
        value = aws_s3_bucket.env_bucket.id
      }
      ```
      3. Commit and push.
    hint: "Same code, different configurations. The env variable controls which environment we're deploying to."

  - order: 2
    title: "Create the Staging Stack"
    instruction: |
      1. In Spacelift, create a new stack named **${staging_stack_name}**.
      2. Point it to your repository with **Project root**: **environments**.
      3. Add an environment variable: **TF_VAR_env** = **staging**.
      4. Enable **Autodeploy**.
      5. Attach the AWS integration.
    hint: "Staging deploys automatically. Every push goes straight to staging."
    validationHint: "The staging stack should be created with autodeploy enabled."
    validation: |
      package spacelift

      staging_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.staging_stack_name
      }

      valid if {
        staging_stack.autodeploy == true
      }

  - order: 3
    title: "Create the Production Stack"
    instruction: |
      1. Create another stack named **${production_stack_name}**.
      2. Point it to the same repository with **Project root**: **environments**.
      3. Add an environment variable: **TF_VAR_env** = **production**.
      4. **Disable** Autodeploy (leave it unchecked).
      5. Attach the AWS integration.
    hint: "Production requires manual approval. Autodeploy is OFF."
    validationHint: "The production stack should be created with autodeploy disabled."
    validation: |
      package spacelift

      production_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.production_stack_name
      }

      valid if {
        production_stack.autodeploy == false
      }

  - order: 4
    title: "Create the Promotion Dependency"
    instruction: |
      1. Open the **${production_stack_name}** stack.
      2. Go to the **Dependencies** tab.
      3. Add a dependency on **${staging_stack_name}**.
      4. Save the dependency.
    hint: "Staging has to pass before production can even try. This is your promotion gate."
    validationHint: "Production should depend on staging."
    validation: |
      package spacelift

      production_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.production_stack_name
      }

      staging_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.staging_stack_name
      }

      valid if {
        staging_stack.id in production_stack.dependencies
      }

  - order: 5
    title: "Trigger the Promotion Flow"
    instruction: |
      1. Go to the **${staging_stack_name}** stack and click **Trigger**.
      2. Watch staging run automatically through to **FINISHED**.
      3. After staging succeeds, check the **${production_stack_name}** stack.
      4. You should see a run in **UNCONFIRMED** state, waiting for manual approval.
    hint: "Staging passed. Production is ready but waiting for you to approve."
    validationHint: "Staging should have completed successfully and production should be waiting for approval."
    validation: |
      package spacelift

      staging_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.staging_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == staging_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "FINISHED"
      }

  - order: 6
    title: "Approve Production"
    instruction: |
      1. Open the unconfirmed run on **${production_stack_name}**.
      2. Review the plan.
      3. Click **Confirm** to approve the deployment.
      4. Watch production deploy successfully.
    hint: "The dependency isn't just about order - it's about safety. You control when production goes."
    validationHint: "Production should have a completed run after you approved the deployment."
    validation: |
      package spacelift

      production_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.production_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == production_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "FINISHED"
      }

completion:
  successMessage: "You've built a promotion gate! Staging deploys automatically, production waits for approval, and a failed staging blocks production entirely. This is enterprise-grade deployment orchestration."
  recommendedGuideIds: []
