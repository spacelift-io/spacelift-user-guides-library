name: "Reusable Configuration"
description: "Learn to extract, share, and automate configuration across stacks using contexts, labels, and space inheritance."
ordering: 1
variables:
  - name: "main_stack_name"
    description: "Name of the primary Spacelift stack"
    resourceType: "stack"
  - name: "second_stack_name"
    description: "Name of the second stack for testing autoattachment"
    resourceType: "stack"
  - name: "context_name"
    description: "Name of the reusable context"
    resourceType: "stack"
  - name: "company_context_name"
    description: "Name of the company-wide context"
    resourceType: "stack"
  - name: "policy_name"
    description: "Name of the plan policy"
    resourceType: "policy"
  - name: "space_name"
    description: "Name of the team space"
    resourceType: "space"
  - name: "child_space_name"
    description: "Name of the child production space"
    resourceType: "space"
