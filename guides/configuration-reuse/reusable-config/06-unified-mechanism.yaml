slug: config-reuse-unified-mechanism
ordering: 6
releaseState: testing
prerequisiteGuideSlugs:
  - "config-reuse-space-inheritance"
metadata:
  title: "One Mechanism, Many Components"
  description: "Discover that autoattachment and space inheritance work the same way for contexts, policies, and cloud integrations"
  labels: ["policies", "integrations", "autoattachment", "unified-model"]
  difficulty: "medium"
  minutesToComplete: 20
  prerequisites:
    - "Completed the Space Inheritance guide with a space hierarchy set up"

steps:
  - order: 1
    title: "Create a Plan Policy"
    instruction: |
      1. Navigate to [Enforce Guardrails > Policies](/policies).
      2. Click **Create policy**.
      3. Name: **${policy_name}**, Type: **Plan**, Space: **${space_name}**.
      4. Add this OPA/Rego rule that requires a team tag:
      ```language-rego
      package spacelift
      import rego.v1

      deny contains msg if {
        rc := input.terraform.resource_changes[_]
        rc.type == "aws_s3_bucket"
        team := object.get(object.get(rc.change.after, "tags", {}), "team", null)
        team == null
        msg := sprintf("S3 bucket %s is missing required 'team' tag", [rc.address])
      }
      ```
      5. Click **Create policy**.
    hint: "Wait - does autoattachment work for policies too? Yes! The same mechanism applies to all attachable resources."
    validationHint: "Your plan policy should be created."
    validation: |
      package spacelift

      valid if {
        some policy in input.policies
        policy.name == input.expectations.policy_name
        policy.type == "PLAN"
      }

  - order: 2
    title: "Autoattach Policy to Space"
    instruction: |
      1. Open your policy **${policy_name}**.
      2. Click **Edit** and add the label **autoattach:*** (asterisk means all).
      3. Save the changes.
    hint: "Just like contexts, policies can autoattach. Any stack in your team space or below will get this policy."

  - order: 3
    title: "Make a Code Change"
    instruction: |
      1. Add a small resource to your **main.tf**:
      ```language-hcl
      resource "terraform_data" "trigger" {
        input = var.environment
      }
      ```
      2. Commit and push this change.
    hint: "Plan policies only evaluate resources that have changes. Adding a new resource ensures the plan has something to evaluate, and the bucket will appear in the plan alongside it."

  - order: 4
    title: "Test the Policy"
    instruction: |
      1. A run will trigger automatically on **${main_stack_name}**.
      2. The policy should evaluate during the planning phase.
      3. Your bucket lacks a 'team' tag, so the run will fail with a DENY.
      4. Check the Policy evaluation section in the run details.
    hint: "The policy automatically applies because your stack inherited it through space hierarchy + autoattachment."
    validationHint: "The run should fail with a policy denial about the missing team tag."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == main_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "FAILED"
      }

  - order: 5
    title: "Fix the Violation"
    instruction: |
      1. Update your **main.tf** to add the team tag:
      ```language-hcl
      resource "aws_s3_bucket" "data" {
        bucket_prefix = "orbit-labs-"

        tags = {
          name        = "Orbit Labs Storage"
          managedBy   = "Spacelift"
          environment = var.environment
          team        = "platform"
        }
      }
      ```
      2. Commit and push this change.
      3. Wait for the run to complete successfully.
    hint: "Now your infrastructure is compliant with the team policy. All stacks in this space hierarchy will be held to the same standard."
    validationHint: "Wait for the run to complete successfully with no policy denials."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == main_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "FINISHED"
      }

  - order: 6
    title: "Autoattach AWS Integration (Informational)"
    instruction: |
      1. Navigate to [Integrate services > Cloud integrations](/cloud-integrations) and open your AWS integration.
      2. Notice the **Edit** button — this is where you could add an **autoattach:** label, just like you did for contexts and policies.
      3. For example, adding **autoattach:*** with space scope **${space_name}** would automatically attach AWS credentials to every stack in the team space.
      4. **Do not modify your AWS integration** — it's shared across guides. This step is informational only.
    hint: "AWS integrations support the same autoattachment mechanism as contexts and policies. The pattern is always the same: add an autoattach label, set the space scope, and let Spacelift do the wiring."

completion:
  successMessage: "Contexts, policies, integrations - same mechanism. The space hierarchy is your organizational model, and autoattachment is how you express 'this applies to everyone below.' You've mastered configuration reuse in Spacelift!"
  recommendedGuideIds: []
