name: "Policies and Notifications"
description: "Add guardrails to your infrastructure: plan policies enforce rules, approval policies require sign-offs, and notifications keep the team informed."
ordering: 1
variables:
  - name: "main_stack_name"
    description: "Name of the primary Spacelift stack"
    resourceType: "stack"
  - name: "plan_policy_name"
    description: "Name of the plan policy"
    resourceType: "policy"
  - name: "approval_policy_name"
    description: "Name of the approval policy"
    resourceType: "policy"
  - name: "notification_policy_name"
    description: "Name of the notification policy"
    resourceType: "policy"
