slug: safety-notifications
ordering: 4
releaseState: testing
prerequisiteGuideSlugs:
  - "safety-approval-policy"
metadata:
  title: "Mission Control Knows - Notifications"
  description: "Set up notification policies to alert the team when runs need attention"
  labels: ["notification-policy", "inbox", "alerts", "opa", "rego"]
  difficulty: "medium"
  minutesToComplete: 15
  prerequisites:
    - "Completed the Approval Policy guide"

steps:
  - order: 1
    title: "Create a Notification Policy"
    instruction: |
      1. Navigate to [Enforce Guardrails > Policies](/policies).
      2. Click **Create policy**.
      3. Name: **${notification_policy_name}**, Type: **Notification**, Space: **root**.
      4. Add this OPA/Rego rule that notifies when approval is needed:
      ```language-rego
      package spacelift
      import rego.v1

      inbox contains msg if {
        input.run_updated.state == "UNCONFIRMED"
        msg := {
          "title": sprintf("Run needs approval: %s", [input.run_updated.stack.name]),
          "body": sprintf("Run %s on stack %s is waiting for approval.",
                          [input.run_updated.ulid, input.run_updated.stack.name]),
          "severity": "INFO"
        }
      }
      ```
      5. Click **Create policy**.
    hint: "You can't watch the dashboard 24/7. When something needs attention, you want a ping."
    validationHint: "Your notification policy should be created in the root space."
    validation: |
      package spacelift

      valid if {
        some policy in input.policies
        policy.name == input.expectations.notification_policy_name
        policy.type == "NOTIFICATION"
        policy.space_slug == "root"
      }

  - order: 2
    title: "Make a Change to Trigger Approval"
    instruction: |
      A run with no changes skips straight to FINISHED — no UNCONFIRMED, no notification. You need a real diff.

      1. Update your **main.tf** to add a backups bucket:
      ```language-hcl
      provider "aws" {
        region = "us-east-1"
      }

      variable "environment" {
        default = "demo"
      }

      resource "aws_s3_bucket" "data" {
        bucket_prefix = "orbit-labs-"

        tags = {
          name        = "Orbit Labs Storage"
          managedBy   = "Spacelift"
          environment = var.environment
          cost-center = "engineering"
        }
      }

      resource "aws_s3_bucket" "logs" {
        bucket_prefix = "orbit-labs-logs-"

        tags = {
          name        = "Orbit Labs Logs"
          managedBy   = "Spacelift"
          environment = var.environment
          cost-center = "engineering"
        }
      }

      resource "aws_s3_bucket" "backups" {
        bucket_prefix = "orbit-labs-backups-"

        tags = {
          name        = "Orbit Labs Backups"
          managedBy   = "Spacelift"
          environment = var.environment
          cost-center = "engineering"
        }
      }

      output "bucket_name" {
        value = aws_s3_bucket.data.id
      }
      ```
      2. Commit and push this change.
    hint: "The approval policy gates the run, and the notification policy fires when it enters UNCONFIRMED."

  - order: 3
    title: "Watch the Run Enter Unconfirmed"
    instruction: |
      1. A run will trigger automatically on **${main_stack_name}**.
      2. The run will pause in **QUEUED** state for policy evaluation — approve the first policy evaluation to allow the planning phase to proceed.
      3. The run should stop at **UNCONFIRMED** state, waiting for approval — and the notification policy will fire.
    hint: "The approval policy is still active from the previous guide. Any run with real changes will hit UNCONFIRMED."
    validationHint: "The run should be in UNCONFIRMED state, waiting for approval."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == main_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "UNCONFIRMED"
      }

  - order: 4
    title: "Check the Inbox"
    instruction: |
      1. Click on the **Inbox** icon in the Spacelift navigation (bell icon).
      2. You should see a notification about the run needing approval.
      3. Click the notification to go directly to the run.
    hint: "Mission Control knows. The inbox is your central place for action items."

  - order: 5
    title: "Complete the Run"
    instruction: |
      1. Approve the run to let it proceed.
      2. Wait for the run to reach **FINISHED** state.
    hint: "The notification got you here. Now approve and let it finish."
    validationHint: "Wait for the run to complete successfully after approval."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == main_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "FINISHED"
      }

completion:
  successMessage: "Notifications are flowing! The inbox keeps you informed when runs need attention. Next, let's send notifications to external systems like Slack."
  recommendedGuideIds: ["safety-webhooks"]
