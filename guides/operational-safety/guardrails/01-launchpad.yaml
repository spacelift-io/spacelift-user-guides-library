slug: safety-launchpad
ordering: 1
releaseState: testing
metadata:
  title: "Launchpad - Quick Start"
  description: "Get the basics in place fast: VCS connected, AWS wired up, a plan policy attached, and a stack that hits its first guardrail"
  labels: ["getting-started", "vcs", "aws", "stack", "speedrun", "plan-policy"]
  difficulty: "easy"
  minutesToComplete: 20
  prerequisites:
    - "A GitHub, GitLab, Bitbucket, or Azure DevOps account"
    - "An existing AWS integration (see the 'Credentials, Not Secrets' guide in Foundations)"

steps:
  - order: 1
    title: "Connect Your VCS Provider"
    instruction: |
      1. Navigate to [Integrations](/integrations).
      2. Filter by your version control system and click **View**.
      3. Click **Set up** and follow the authorization prompts.
      4. If you've already connected your VCS provider, you can skip this step and move on.
    hint: "Before you can secure the mission, you need a mission. This speedrun gets your foundation in place."

  - order: 2
    title: "Create a Repository with Terraform"
    instruction: |
      1. In your VCS provider, create a new repository.
      2. Add a **main.tf** file with this S3 bucket configuration:
      ```language-hcl
      provider "aws" {
        region = "us-east-1"
      }

      variable "environment" {
        default = "demo"
      }

      resource "aws_s3_bucket" "data" {
        bucket_prefix = "orbit-labs-"

        tags = {
          name        = "Orbit Labs Storage"
          managedBy   = "Spacelift"
          environment = var.environment
        }
      }

      output "bucket_name" {
        value = aws_s3_bucket.data.id
      }
      ```
      3. Commit and push to your main branch.
    hint: "Notice there's no cost-center tag. That will matter soon."

  - order: 3
    title: "Create Your Stack"
    instruction: |
      1. Go to [Ship Infra > Stacks](/stacks) and click **Create stack**.
      2. Name it **${main_stack_name}**, Space: **root**.
      3. Select your VCS integration and repository, Branch: **main**.
      4. Workflow tool: **OpenTofu**, choose the latest version.
      5. Enable **Autodeploy**.
      6. Complete the wizard and create the stack.
    hint: "This stack will be our test subject for policies."
    validationHint: "Your stack should be created and visible in Spacelift."
    validation: |
      package spacelift

      valid if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

  - order: 4
    title: "Attach the AWS Integration"
    instruction: |
      1. Open your stack **${main_stack_name}**.
      2. Go to the **Settings** tab, then **Integrations**.
      3. Under **Cloud**, click **Attach** next to your AWS integration.
      4. Configure it to read and write.
    hint: "If you don't have an AWS integration yet, create one from [Integrations](/integrations) by clicking **AWS**, or complete the 'Credentials, Not Secrets' guide in Foundations first."
    validationHint: "The AWS integration should be attached to your stack."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      valid if {
        some attachment in input.aws_attachments
        attachment.attached_to == main_stack.id
      }

  - order: 5
    title: "Create a Plan Policy"
    instruction: |
      1. Navigate to [Enforce Guardrails > Policies](/policies).
      2. Click **Create policy**.
      3. Name: **${plan_policy_name}**, Type: **Plan**, Space: **root**.
      4. Add this OPA/Rego rule that requires a cost-center tag:
      ```language-rego
      package spacelift
      import rego.v1

      deny contains msg if {
        rc := input.terraform.resource_changes[_]
        rc.type == "aws_s3_bucket"

        tags := object.get(rc.change.after, "tags", {})
        cost_center := object.get(tags, "cost-center", null)
        cost_center == null

        msg := sprintf("S3 bucket %s is missing required 'cost-center' tag", [rc.address])
      }
      ```
      5. Click **Create policy**.
    hint: "The finance team wants to know what's costing money. Every resource must have a cost-center tag."
    validationHint: "Your plan policy should be created."
    validation: |
      package spacelift

      valid if {
        some policy in input.policies
        policy.name == input.expectations.plan_policy_name
        policy.type == "PLAN"
      }

  - order: 6
    title: "Attach Policy to Stack"
    instruction: |
      1. Open your stack **${main_stack_name}**.
      2. Go to the **Policies** tab.
      3. Click **Attach policy**.
      4. Select **${plan_policy_name}**.
      5. Save the attachment.
    hint: "Now every run on this stack will be evaluated against your policy."
    validationHint: "The policy should be attached to your stack."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      valid if {
        some attachment in input.policy_attachments
        attachment.name == input.expectations.plan_policy_name
        attachment.stack_id == main_stack.id
      }

  - order: 7
    title: "Trigger a Run and Watch It Fail"
    instruction: |
      1. Click **Trigger** on your stack **${main_stack_name}**.
      2. Watch the run progress through INITIALIZING and PLANNING.
      3. The run should **FAIL** with a policy denial - your S3 bucket is missing the cost-center tag.
      4. Check the **Policy evaluation** section to see the violation message.
    hint: "The guardrail caught it! Your bucket doesn't have a cost-center tag, so the policy blocks the deployment."
    validationHint: "The run should fail with a policy denial about the missing cost-center tag."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == main_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "FAILED"
      }

completion:
  successMessage: "Your launchpad is ready - and your first guardrail is already working! The plan policy blocked a non-compliant deployment. Next, let's fix the violation and learn more about plan policies."
  recommendedGuideIds: ["safety-plan-policy"]
