slug: safety-approval-policy
ordering: 3
releaseState: testing
prerequisiteGuideSlugs:
  - "safety-plan-policy"
metadata:
  title: "Four Eyes - Approval Policies"
  description: "Require human approval before changes apply - because some decisions shouldn't be automated"
  labels: ["approval-policy", "opa", "rego", "governance", "sign-off"]
  difficulty: "medium"
  minutesToComplete: 15
  prerequisites:
    - "Completed the Plan Policy guide"

steps:
  - order: 1
    title: "Disable Autodeploy"
    instruction: |
      1. Open your stack **${main_stack_name}**.
      2. Go to **Settings** > **Behavior**.
      3. Disable **Autodeploy** (uncheck it).
      4. Save the change.
    hint: "We want runs to wait for approval. Autodeploy would bypass our approval policy."
    validationHint: "Autodeploy should be disabled on your stack."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      valid if {
        main_stack.autodeploy == false
      }

  - order: 2
    title: "Create an Approval Policy"
    instruction: |
      1. Navigate to [Enforce Guardrails > Policies](/policies).
      2. Click **Create policy**.
      3. Name: **${approval_policy_name}**, Type: **Approval**, Space: **root**.
      4. Add this OPA/Rego rule requiring one approval:
      ```language-rego
      package spacelift
      import rego.v1

      approve if {
        count(input.reviews.current.approvals) > 0
      }

      reject if {
        count(input.reviews.current.rejections) > 0
      }
      ```
      5. Click **Create policy**.
    hint: "Production changes need a second pair of eyes. This policy requires at least one approval."
    validationHint: "Your approval policy should be created."
    validation: |
      package spacelift

      valid if {
        some policy in input.policies
        policy.name == input.expectations.approval_policy_name
        policy.type == "APPROVAL"
      }

  - order: 3
    title: "Attach Policy to Stack"
    instruction: |
      1. Open your stack **${main_stack_name}**.
      2. Go to the **Policies** tab.
      3. Click **Attach policy**.
      4. Select **${approval_policy_name}**.
      5. Save the attachment.
    hint: "Now every run on this stack will require approval before applying."
    validationHint: "The policy should be attached to your stack."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      valid if {
        some attachment in input.policy_attachments
        attachment.name == input.expectations.approval_policy_name
        attachment.stack_id == main_stack.id
      }

  - order: 4
    title: "Add a New Resource"
    instruction: |
      1. Update your **main.tf** to add a second S3 bucket:
      ```language-hcl
      provider "aws" {
        region = "us-east-1"
      }

      variable "environment" {
        default = "demo"
      }

      resource "aws_s3_bucket" "data" {
        bucket_prefix = "orbit-labs-"

        tags = {
          name        = "Orbit Labs Storage"
          managedBy   = "Spacelift"
          environment = var.environment
          cost-center = "engineering"
        }
      }

      resource "aws_s3_bucket" "logs" {
        bucket_prefix = "orbit-labs-logs-"

        tags = {
          name        = "Orbit Labs Logs"
          managedBy   = "Spacelift"
          environment = var.environment
          cost-center = "engineering"
        }
      }

      output "bucket_name" {
        value = aws_s3_bucket.data.id
      }
      ```
      2. Commit and push this change.
    hint: "The approval flow needs real infrastructure changes to go through the full cycle. If the plan has no changes, the run skips the confirmation step entirely."

  - order: 5
    title: "Watch the Run Enter Unconfirmed"
    instruction: |
      1. A run will trigger automatically on **${main_stack_name}**.
      2. The run should stop at **UNCONFIRMED** state — before planning even starts.
      3. The approval policy evaluated to **UNDECIDED** (neither approved nor rejected), so the run waits for human input.
    hint: "Approval policies evaluate when a run is created, before planning. The run waits for human input before it even looks at what will change."
    validationHint: "The run should be in UNCONFIRMED state, waiting for approval."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == main_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "UNCONFIRMED"
      }

  - order: 6
    title: "Approve, Confirm, and Complete"
    instruction: |
      1. Open the unconfirmed run on **${main_stack_name}**.
      2. Click **Approve** to give your approval.
      3. The run will proceed to **PLANNING**.
      4. After planning completes, review the plan to see what will change.
      5. Click **Confirm** to apply the changes.
      6. Wait for the run to reach **FINISHED** state.
    hint: "Two gates: first the approval policy (before planning), then the manual confirm (after planning, because autodeploy is off). In a real scenario, a teammate would approve your change, and you'd confirm the apply after reviewing the plan."
    validationHint: "The run should complete successfully after approval and confirmation."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      tracked_runs contains run if {
        some run in input.runs
        run.stack_id == main_stack.id
        run.type == "TRACKED"
      }

      latest_tracked_run := run if {
        some run in tracked_runs
        run.created_at == max([r.created_at | some r in tracked_runs])
      }

      valid if {
        latest_tracked_run.status == "FINISHED"
      }

  - order: 7
    title: "Re-enable Autodeploy"
    instruction: |
      1. Open your stack **${main_stack_name}**.
      2. Go to **Settings** > **Behavior**.
      3. Enable **Autodeploy** (check it).
      4. Save the change.
    hint: "You've seen how manual confirmation works. Re-enabling autodeploy means future runs will auto-apply after approval — no second confirm needed."
    validationHint: "Autodeploy should be enabled on your stack."
    validation: |
      package spacelift

      main_stack := stack if {
        some stack in input.stacks
        stack.name == input.expectations.main_stack_name
      }

      valid if {
        main_stack.autodeploy == true
      }

completion:
  successMessage: "Four eyes principle in action! Approval policies require human sign-off before changes even plan. Combined with manual confirmation, you get two gates protecting your infrastructure. Next, let's set up notifications so the team knows when approvals are needed."
  recommendedGuideIds: ["safety-notifications"]
